networks:
  network:

services:
  postgres:
    image: postgres:18
    container_name: csw__turtle_database
    restart: unless-stopped
    volumes:
      - ./data/database:/var/lib/postgresql
    networks:
      - network
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

  backend:
    build: backend
    container_name: csw__turtle_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mailhog
    networks:
      - network
    environment:
      DATASOURCE_SERVER: postgres:5432
      DATASOURCE_DATABASE: db
      DATASOURCE_USERNAME: admin
      DATASOURCE_PASSWORD: admin
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME:
      SMTP_PASSWORD:

  frontend:
    build: frontend
    container_name: csw__turtle_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - network
    environment:
      NODE_ENV: production
      ORIGIN: http://localhost
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host

  nginx:
    image: nginx:latest
    container_name: csw__turtle_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - network